<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The extension supports for detector APIs of the website</title>
    <link rel="stylesheet" href="../css/popup.css">
</head>

<body>
<div class="app">
    <header class="app-header">
        <h1 class="app-title">Detector APIs Extension</h1>
        <a class="donate-pill" href="https://paypal.me/Newslette247" target="_blank">☕ Buy me a coffee — donate here</a>
    </header>

    <div class="toast" id="alert-success"></div>

    <div class="toolbar">
        <div class="toolbar-left">
            <label class="switch">
                <input type="checkbox" id="preserve-log">
                <span class="slider"></span>
            </label>
            <span class="toolbar-label">Preserve log</span>
        </div>
        <span class="request-count" id="request-count">0 requests</span>
    </div>

    <div class="table-wrap" id="table-wrap">
        <table class="result-table" id="table-result-detector-apis">
            <thead>
            <tr>
                <th class="col-curl">Curl</th>
                <th class="col-url">URL</th>
                <th class="col-status">Status</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <div class="empty-state" id="empty-state">
            <span class="empty-state-icon">📡</span>
            <span>No API requests detected yet.</span>
        </div>
    </div>

    <footer class="app-footer">© nguyenvantuan2391996@gmail.com</footer>
</div>

</body>
</html>

<script src="../js/popup.js"></script>
<script src="../js/constants.js"></script>
<script src="../js/utils.js"></script>
