<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The extension supports for detector APIs of the website</title>
    <link rel="stylesheet" href="../css/popup.css">
</head>

<body>
<div class="app">
    <header class="app-header">
        <h1 class="app-title">Detector APIs Extension</h1>
        <a class="donate-pill" href="https://paypal.me/Newslette247" target="_blank">☕ Buy me a coffee — donate here</a>
    </header>

    <div class="toast" id="alert-success"></div>

    <div class="toolbar">
        <div class="toolbar-left">
            <label class="switch">
                <input type="checkbox" id="preserve-log">
                <span class="slider"></span>
            </label>
            <span class="toolbar-label">Preserve log</span>
        </div>
        <div class="toolbar-right">
            <span class="live-indicator" title="Watching for new requests in real time"><span class="live-dot"></span>Live</span>
            <button type="button" class="export-btn" id="export-postman-btn" disabled>Export Postman</button>
            <button type="button" class="copy-all-btn" id="copy-all-btn" disabled>Copy All Curl</button>
            <span class="request-count" id="request-count">0 requests</span>
        </div>
    </div>

    <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by URL..." aria-label="Search by URL">
    </div>

    <div class="table-wrap" id="table-wrap">
        <table class="result-table" id="table-result-detector-apis">
            <thead>
            <tr>
                <th class="col-curl">Curl</th>
                <th class="col-url">URL</th>
                <th class="col-status">Status</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <div class="empty-state" id="empty-state">
            <span class="empty-state-icon">📡</span>
            <span class="empty-state-text">No API requests detected yet.</span>
        </div>
    </div>

    <footer class="app-footer">
        <div class="footer-meta">
            <span class="footer-copyright">© 2026 Detector APIs Extension</span>
            <span class="footer-dot">&middot;</span>
            <a class="footer-email-link" href="mailto:nguyenvantuan2391996@gmail.com">nguyenvantuan2391996@gmail.com</a>
        </div>
        <div class="footer-contact">
            <span class="footer-contact-label">Feedback or found a bug?</span>
            <div class="footer-socials">
                <a class="footer-social-link" href="mailto:nguyenvantuan2391996@gmail.com" aria-label="Email" title="Email">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M2 4h20v16H2V4zm2 2.24V6l8 5.99L20 6v.24l-8 6-8-6zM20 18V8.51l-8 6-8-6V18h16z"/></svg>
                </a>
                <a class="footer-social-link" href="https://www.linkedin.com/in/tuan-nguyen-van-555315156" target="_blank" aria-label="LinkedIn" title="LinkedIn">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.14 1.45-2.14 2.94v5.66H9.5V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
                </a>
                <a class="footer-social-link" href="https://www.facebook.com/tuanelnino9/" target="_blank" aria-label="Facebook" title="Facebook">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.1 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"/></svg>
                </a>
            </div>
        </div>
    </footer>
</div>

</body>
</html>

<script src="../js/popup.js"></script>
<script src="../js/constants.js"></script>
<script src="../js/utils.js"></script>
